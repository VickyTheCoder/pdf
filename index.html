<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PDF Page Replacer</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#f4f6f8;
}

.container-box{
width:95%;
max-width:400px;
}

button{
width:100%;
margin-bottom:15px;
padding:15px;
font-size:18px;
}
</style>

</head>

<body>

<div class="container-box">

<button class="btn btn-primary" id="pickPdf">
1️⃣ Browse PDF
</button>

<button class="btn btn-secondary" id="pickImage">
2️⃣ Browse Image
</button>

<button class="btn btn-success" id="generatePdf">
3️⃣ Final Copy
</button>

<button class="btn btn-dark" id="sharePdf" disabled>
4️⃣ Share PDF
</button>

<input type="file" id="pdfInput" accept="application/pdf" hidden>
<input type="file" id="imgInput" accept="image/*" hidden>

</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js')
}
</script>

</body>
</html>
