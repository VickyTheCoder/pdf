<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Tool</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Theme -->
  <meta name="theme-color" content="#0d6efd" />

  <!-- Bootstrap (optional but clean UI) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-light">

  <div class="container py-4">
    <h3 class="text-center mb-4">Client Doc Share</h3>

    <div class="card p-3 shadow-sm">

      <!-- PDF Input -->
      <div class="mb-3">
        <label class="form-label">Select PDF</label>
        <input
          type="file"
          id="pdfInput"
          accept="application/pdf"
          class="form-control"
        />
      </div>

      <!-- Image Input -->
      <div class="mb-3">
        <label class="form-label">Select Image</label>
        <input
          type="file"
          id="imgInput"
          accept="image/*"
          class="form-control"
        />
      </div>

      <!-- Buttons -->
      <div class="d-flex gap-2">
        <button id="generatePdf" class="btn btn-primary w-50" disabled>
          Final Copy
        </button>

        <button id="sharePdf" class="btn btn-success w-50" disabled>
          Share
        </button>
      </div>

    </div>
  </div>

  <!-- PDF-LIB -->
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

  <!-- App JS -->
  <script src="app.js"></script>

  <!-- Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js");
    }
  </script>

</body>
</html>
