<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Client Doc Share</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d6efd">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container text-center mt-5">

  <h3 class="mb-4">Client Doc Share</h3>

  <!-- Inputs -->
  <input type="file" id="pdfInput" accept="application/pdf" class="form-control mb-3">

  <input type="file" id="imageInput" accept="image/*" multiple class="form-control mb-4" disabled>

  <!-- Buttons -->
  <button id="btn1" class="btn btn-primary w-100 mb-2">1. Select PDF</button>

  <button id="btn2" class="btn btn-primary w-100 mb-2" disabled>
    2. Enable Image Selection
  </button>

  <button id="btn3" class="btn btn-primary w-100 mb-2" disabled>
    3. Create PDF
  </button>

  <button id="btn4" class="btn btn-primary w-100 mb-2" disabled>
    4. Share PDF
  </button>

</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
